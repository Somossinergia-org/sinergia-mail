name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx tsc --noEmit

  lint:
    name: ESLint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx next lint

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      # Mocked envs so Next.js build succeeds without real secrets in CI
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ci-mock-secret-for-build-only-not-used-at-runtime
      GOOGLE_CLIENT_ID: ci-mock-client-id
      GOOGLE_CLIENT_SECRET: ci-mock-client-secret
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      GEMINI_API_KEY: ci-mock-gemini-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx next build
